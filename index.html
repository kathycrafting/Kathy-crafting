<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kathy's Crafting Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --terracotta: #C4714A;
    --terracotta-light: #E8A882;
    --terracotta-pale: #F5E6DC;
    --sage: #7A9E87;
    --sage-pale: #EAF1EC;
    --charcoal: #2C2825;
    --mid: #6B6560;
    --light: #B5AFA9;
    --border: #E8E2DA;
    --shadow: rgba(44,40,37,0.08);
    --shadow-md: rgba(44,40,37,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  header {
    background: var(--charcoal);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--cream);
    letter-spacing: 0.01em;
  }
  header p {
    font-size: 12px;
    color: var(--light);
    margin-top: 2px;
    font-weight: 300;
  }

  /* SEARCH */
  .search-bar {
    padding: 12px 16px;
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 72px;
    z-index: 99;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--cream);
    color: var(--charcoal);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--terracotta); }
  .search-bar input::placeholder { color: var(--light); }

  /* ITEM LIST */
  .list { padding: 12px 16px 100px; }

  .item-card {
    background: var(--warm-white);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .item-card:active { transform: scale(0.985); }
  .item-card.has-photo { border-color: var(--sage); }

  .item-main {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
  }

  .item-thumb {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    background: var(--terracotta-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  .item-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
  }
  .item-thumb .thumb-icon {
    font-size: 22px;
  }
  .item-thumb .photo-badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    background: var(--sage);
    border-radius: 50%;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    border: 2px solid var(--warm-white);
  }

  .item-info { flex: 1; min-width: 0; }
  .item-id {
    font-size: 11px;
    font-weight: 600;
    color: var(--terracotta);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .item-type {
    font-size: 16px;
    font-weight: 600;
    color: var(--charcoal);
    text-transform: capitalize;
  }
  .item-meta {
    font-size: 12px;
    color: var(--mid);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-arrow {
    color: var(--light);
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ADD BUTTON */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 20px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--terracotta);
    color: white;
    border: none;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(196,113,74,0.45);
    cursor: pointer;
    z-index: 200;
    -webkit-tap-highlight-color: transparent;
  }

  /* MODAL OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,40,37,0.55);
    z-index: 300;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    align-items: flex-end;
  }
  .overlay.open { display: flex; }

  /* BOTTOM SHEET */
  .sheet {
    background: var(--warm-white);
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 0 0 40px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .sheet-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .sheet-header-left { flex: 1; }
  .sheet-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--terracotta);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .sheet-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--charcoal);
    text-transform: capitalize;
    margin-top: 2px;
  }
  .sheet-close {
    background: var(--cream);
    border: none;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 18px;
    color: var(--mid);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 4px;
  }

  /* PHOTO SECTION */
  .photo-section {
    margin: 16px 20px;
  }
  .photo-preview {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 14px;
    background: var(--terracotta-pale);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    border: 2px dashed var(--terracotta-light);
    margin-bottom: 12px;
  }
  .photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 12px;
  }
  .photo-preview .no-photo-text {
    font-size: 13px;
    color: var(--terracotta-light);
    font-weight: 500;
    margin-top: 8px;
  }
  .photo-preview .no-photo-icon { font-size: 40px; }

  .photo-delete {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(44,40,37,0.65);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    color: white;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .photo-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .photo-btn {
    padding: 14px 10px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--charcoal);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .photo-btn:active { background: var(--terracotta-pale); border-color: var(--terracotta); }
  .photo-btn .btn-icon { font-size: 26px; }
  .photo-btn.primary {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: white;
  }
  .photo-btn.primary:active { background: #a85c38; }

  /* DETAILS SECTION */
  .details-section {
    padding: 0 20px;
    margin-top: 4px;
  }
  .details-section h3 {
    font-size: 11px;
    font-weight: 600;
    color: var(--light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--mid); font-weight: 400; }
  .detail-value { color: var(--charcoal); font-weight: 500; text-align: right; text-transform: capitalize; }

  /* HIDDEN INPUTS */

  .sort-bar { padding: 6px 12px 8px; background: var(--warm-white); border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; position: sticky; top: 110px; z-index: 98; overflow-x: auto; }
  .sort-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: var(--mid); cursor: pointer; white-space: nowrap; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .sort-btn.active { background: var(--charcoal); color: var(--cream); border-color: var(--charcoal); }
  .sort-label { font-size: 11px; color: var(--light); font-weight: 500; white-space: nowrap; flex-shrink: 0; }

  input[type="file"] { display: none; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--mid);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* COUNT */
  .list-count {
    font-size: 12px;
    color: var(--mid);
    padding: 8px 16px 4px;
    font-weight: 500;
  }

  .header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .export-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 9px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    margin-top: 2px;
  }
  .export-btn:active { background: rgba(255,255,255,0.22); }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--charcoal);
    color: var(--cream);
    padding: 11px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 500;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .save-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--sage);
    margin-left: 6px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-dot.visible { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>Kathy's Crafting Inventory<span class="save-dot" id="saveDot"></span></h1>
      <p>Photos auto-saved · Tap any item to take or view a photo</p>
    </div>
    <button class="export-btn" onclick="exportZip()">? Export ZIP</button>
  </div>
</header>
<div class="toast" id="toast"></div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search by type, colour, identifier…" />
</div>

<div class="sort-bar">
  <span class="sort-label">Sort:</span>
  <button class="sort-btn active" onclick="setSort('type')">Object Type</button>
  <button class="sort-btn" onclick="setSort('cabinet')">Cabinet</button>
  <button class="sort-btn" onclick="setSort('identifier')">Identifier</button>
  <button class="sort-btn" onclick="setSort('color')">Colour</button>
</div>

<div class="list-count" id="listCount"></div>
<div class="list" id="itemList"></div>

<button class="fab" onclick="openAddSheet()" title="Add new item">?</button>

<!-- ITEM DETAIL SHEET -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-header-left">
        <div class="sheet-label" id="sheetLabel"></div>
        <div class="sheet-title" id="sheetTitle"></div>
      </div>
      <button class="sheet-close" onclick="closeSheet()">?</button>
    </div>

    <!-- Photo Area -->
    <div class="photo-section">
      <div class="photo-preview" id="photoPreview">
        <div class="no-photo-icon">?</div>
        <div class="no-photo-text">No photo yet</div>
      </div>
      <div class="photo-actions">
        <button class="photo-btn primary" onclick="triggerCamera()">
          <span class="btn-icon">?</span>
          Take Photo
        </button>
        <button class="photo-btn" onclick="triggerLibrary()">
          <span class="btn-icon">??</span>
          Choose Photo
        </button>
      </div>
    </div>

    <!-- Details -->
    <div class="details-section">
      <h3>Details</h3>
      <div id="sheetDetails"></div>
    </div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="cameraInput" accept="image/*" capture="camera" onchange="handlePhotoInput(event)">
<input type="file" id="libraryInput" accept="image/*" onchange="handlePhotoInput(event)">

<script>
const STORAGE_PHOTOS_KEY = 'kathy_crafting_photos';
const STORAGE_ITEMS_KEY  = 'kathy_crafting_items';

const INITIAL_DATA = [
  { Cabinet:1, Shelf:3,  Identifier:"13c01", "Object Type":"stamp",      Theme:"Christmas", Color:null,    "Paper Type":null,           "Paper Pattern":null,    "Kit Pieces":"snow, presents, bows", Notes:null },
  { Cabinet:2, Shelf:1,  Identifier:"21p05", "Object Type":"paper",      Theme:null,        Color:"red",   "Paper Type":"construction", "Paper Pattern":"solid",  "Kit Pieces":null,                  Notes:null },
  { Cabinet:2, Shelf:2,  Identifier:"22p01", "Object Type":"paper",      Theme:null,        Color:"green", "Paper Type":"construction", "Paper Pattern":"floral", "Kit Pieces":null,                  Notes:null },
  { Cabinet:3, Shelf:1,  Identifier:"31cs4", "Object Type":"card stock", Theme:null,        Color:null,    "Paper Type":"card stock",   "Paper Pattern":null,    "Kit Pieces":null,                  Notes:null },
  { Cabinet:4, Shelf:5,  Identifier:"45p14", "Object Type":"pen",        Theme:null,        Color:null,    "Paper Type":null,           "Paper Pattern":null,    "Kit Pieces":null,                  Notes:null },
  { Cabinet:7, Shelf:5,  Identifier:"75d5",  "Object Type":"paper",      Theme:null,        Color:"blue",  "Paper Type":"construction", "Paper Pattern":"solid",  "Kit Pieces":null,                  Notes:null },
  { Cabinet:2, Shelf:4,  Identifier:"24i18", "Object Type":"ink pad",    Theme:null,        Color:"black", "Paper Type":null,           "Paper Pattern":null,    "Kit Pieces":null,                  Notes:null },
];

const TYPE_ICONS = {
  stamp: "?", paper: "?", "card stock": "??", pen: "??",
  "ink pad": "?", scissors: "??", ribbon: "?", sticker: "?"
};

// --- Persistence ---
function loadFromStorage() {
  try {
    const savedPhotos = localStorage.getItem(STORAGE_PHOTOS_KEY);
    if (savedPhotos) photos = JSON.parse(savedPhotos);
    const savedItems = localStorage.getItem(STORAGE_ITEMS_KEY);
    if (savedItems) items = JSON.parse(savedItems);
  } catch(e) { console.warn('Storage load failed', e); }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_PHOTOS_KEY, JSON.stringify(photos));
    localStorage.setItem(STORAGE_ITEMS_KEY, JSON.stringify(items));
    flashSaveDot();
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      showToast('?? Storage full — export your ZIP to free space');
    }
  }
}

function flashSaveDot() {
  const dot = document.getElementById('saveDot');
  if (!dot) return;
  dot.classList.add('visible');
  clearTimeout(dot._t);
  dot._t = setTimeout(() => dot.classList.remove('visible'), 1800);
}

function showToast(msg, duration = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), duration);
}

// --- Export ZIP ---
async function exportZip() {
  const photoIds = Object.keys(photos);
  if (!photoIds.length) { showToast('No photos to export yet'); return; }

  showToast('? Building ZIP…', 5000);
  const zip = new JSZip();
  const folder = zip.folder('KathyCrafting_Photos');

  for (const id of photoIds) {
    const dataUrl = photos[id];
    const base64 = dataUrl.split(',')[1];
    const ext = dataUrl.includes('image/png') ? 'png' : 'jpg';
    folder.file(`${id}.${ext}`, base64, { base64: true });
  }

  // Add manifest JSON
  const manifest = items.map(item => ({
    ...item,
    hasPhoto: !!photos[item.Identifier]
  }));
  zip.file('manifest.json', JSON.stringify(manifest, null, 2));

  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'KathyCrafting_Photos.zip';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`? Exported ${photoIds.length} photo${photoIds.length !== 1 ? 's' : ''}`);
}

let items = INITIAL_DATA.filter(i => i.Identifier);
let photos = {};
let currentItem = null;

loadFromStorage();

function getIcon(type) {
  return TYPE_ICONS[(type||"").toLowerCase()] || "?";
}


let currentSort = 'type';

function setSort(field) {
  currentSort = field;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderList(document.getElementById('searchInput').value);
}

function sortItems(arr) {
  const sorted = [...arr];
  sorted.sort((a, b) => {
    let av, bv;
    if (currentSort === 'type')       { av = a["Object Type"]||''; bv = b["Object Type"]||''; }
    else if (currentSort === 'cabinet') { av = a.Cabinet||0; bv = b.Cabinet||0; return av - bv; }
    else if (currentSort === 'identifier') { av = a.Identifier||''; bv = b.Identifier||''; }
    else if (currentSort === 'color') { av = a.Color||'zzz'; bv = b.Color||'zzz'; }
    return av.toString().toLowerCase().localeCompare(bv.toString().toLowerCase());
  });
  return sorted;
}

function getMeta(item) {
  const parts = [];
  if (item.Color) parts.push(item.Color);
  if (item["Paper Type"]) parts.push(item["Paper Type"]);
  if (item.Theme) parts.push(item.Theme);
  if (item["Paper Pattern"]) parts.push(item["Paper Pattern"]);
  if (!parts.length) { parts.push(`Cabinet ${item.Cabinet}, Shelf ${item.Shelf}`); }
  return parts.join(" · ");
}

function renderList(filter = "") {
  const list = document.getElementById("itemList");
  const countEl = document.getElementById("listCount");
  const q = filter.toLowerCase().trim();
  const filtered = items.filter(item => {
    if (!q) return true;
    return [item.Identifier, item["Object Type"], item.Color, item.Theme,
            item["Paper Type"], item["Paper Pattern"]]
      .some(v => v && v.toLowerCase().includes(q));
  });

  countEl.textContent = `${filtered.length} item${filtered.length !== 1 ? "s" : ""}`;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">?</div><p>No items match your search.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(item => {
    const photo = photos[item.Identifier];
    const hasPhoto = !!photo;
    return `
    <div class="item-card ${hasPhoto ? 'has-photo' : ''}" onclick="openSheet('${item.Identifier}')">
      <div class="item-main">
        <div class="item-thumb">
          ${hasPhoto
            ? `<img src="${photo}" alt="photo">`
            : `<span class="thumb-icon">${getIcon(item["Object Type"])}</span>`}
          ${hasPhoto ? `<div class="photo-badge">?</div>` : ""}
        </div>
        <div class="item-info">
          <div class="item-id">${item.Identifier}</div>
          <div class="item-type">${item["Object Type"] || "—"}</div>
          <div class="item-meta">${getMeta(item)}</div>
        </div>
        <div class="item-arrow">›</div>
      </div>
    </div>`;
  }).join("");
}

function openSheet(identifier) {
  currentItem = items.find(i => i.Identifier === identifier);
  if (!currentItem) return;

  document.getElementById("sheetLabel").textContent = currentItem.Identifier;
  document.getElementById("sheetTitle").textContent = currentItem["Object Type"] || "Item";

  refreshPhotoPreview();

  const fields = [
    ["Cabinet", currentItem.Cabinet],
    ["Shelf", currentItem.Shelf],
    ["Theme", currentItem.Theme],
    ["Colour", currentItem.Color],
    ["Paper Type", currentItem["Paper Type"]],
    ["Paper Pattern", currentItem["Paper Pattern"]],
    ["Kit Pieces", currentItem["Kit Pieces"]],
    ["Notes", currentItem.Notes],
  ].filter(([,v]) => v !== null && v !== undefined && v !== "");

  document.getElementById("sheetDetails").innerHTML = fields.map(([k, v]) => `
    <div class="detail-row">
      <span class="detail-label">${k}</span>
      <span class="detail-value">${v}</span>
    </div>`).join("") || `<div class="detail-row"><span class="detail-label">No additional details</span></div>`;

  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function refreshPhotoPreview() {
  if (!currentItem) return;
  const photo = photos[currentItem.Identifier];
  const preview = document.getElementById("photoPreview");
  if (photo) {
    preview.innerHTML = `
      <img src="${photo}" alt="Item photo">
      <button class="photo-delete" onclick="deletePhoto(event)" title="Remove photo">?</button>`;
  } else {
    preview.innerHTML = `
      <div class="no-photo-icon">?</div>
      <div class="no-photo-text">No photo yet</div>`;
  }
}

function deletePhoto(event) {
  event.stopPropagation();
  if (!currentItem) return;
  delete photos[currentItem.Identifier];
  saveToStorage();
  refreshPhotoPreview();
  renderList(document.getElementById("searchInput").value);
}

function closeSheet() {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
  currentItem = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("overlay")) closeSheet();
}

function triggerCamera() {
  document.getElementById("cameraInput").click();
}

function triggerLibrary() {
  document.getElementById("libraryInput").click();
}

function handlePhotoInput(event) {
  const file = event.target.files[0];
  if (!file || !currentItem) return;
  const reader = new FileReader();
  reader.onload = e => {
    photos[currentItem.Identifier] = e.target.result;
    saveToStorage();
    showToast('? Photo saved');
    refreshPhotoPreview();
    renderList(document.getElementById("searchInput").value);
  };
  reader.readAsDataURL(file);
  event.target.value = "";
}

function openAddSheet() {
  const id = prompt("Enter Identifier (e.g. 51s02):");
  if (!id) return;
  const type = prompt("Enter Object Type (e.g. stamp, paper, pen):");
  if (!type) return;
  const cabinet = prompt("Cabinet number:");
  const shelf = prompt("Shelf number:");
  items.push({
    Cabinet: parseInt(cabinet)||0, Shelf: parseInt(shelf)||0,
    Identifier: id, "Object Type": type,
    Theme: null, Color: null, "Paper Type": null, "Paper Pattern": null,
    "Kit Pieces": null, Notes: null
  });
  saveToStorage();
  renderList(document.getElementById("searchInput").value);
  setTimeout(() => openSheet(id), 100);
}

document.getElementById("searchInput").addEventListener("input", e => {
  renderList(e.target.value);
});

renderList();
</script>
</body>
</html>
